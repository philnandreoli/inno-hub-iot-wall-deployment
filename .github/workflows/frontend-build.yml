name: Frontend Build

on:
  push:
    branches: [main]
    paths:
      - "src/chat-app/frontend/**"
      - ".github/workflows/frontend-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/chat-app/frontend/**"
      - ".github/workflows/frontend-build.yml"

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: src/chat-app/frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/chat-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_HOSTNAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: src/chat-app/frontend
          push: true
          platforms: linux/amd64
          provenance: false
          build-args: |
            VITE_AZURE_CLIENT_ID=${{ vars.VITE_AZURE_CLIENT_ID }}
            VITE_AZURE_TENANT_ID=${{ vars.VITE_AZURE_TENANT_ID }}
            VITE_AZURE_API_SCOPE=${{ vars.VITE_AZURE_API_SCOPE }}
          tags: |
            ${{ secrets.ACR_HOSTNAME }}/iot-wall-frontend:${{ github.sha }}

  deploy-dev:
    needs: docker-build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        working-directory: .
        run: |
          az containerapp update --name "${{ vars.FRONTEND_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_HOSTNAME }}/iot-wall-frontend:${{ github.sha }}" \
            --set-env-vars \
              BACKEND_URL="${{ vars.BACKEND_URL }}" \
              APPINSIGHTS_CONNECTION_STRING="${{ vars.VITE_APPINSIGHTS_CONNECTION_STRING }}"
